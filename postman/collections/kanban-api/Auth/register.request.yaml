$kind: http-request
name: Register
method: POST
url: '{{baseUrl}}/api/auth/register'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "user@example.com",
      "password": "Password123!",
      "firstName": "John",
      "lastName": "Doe",
      "role": "Admin",
      "addedById": 1
    }
