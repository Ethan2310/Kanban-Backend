$kind: http-request
name: Update Status
method: PUT
url: '{{baseUrl}}/api/statuses/{statusId}'
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "name": "Example Name",
      "orderIndex": 0,
      "color": "#FFFFFF"
    }
