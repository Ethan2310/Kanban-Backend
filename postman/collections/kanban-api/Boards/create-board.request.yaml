$kind: http-request
name: Create Board
method: POST
url: '{{baseUrl}}/api/boards'
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "name": "Example Name",
      "description": "Example description",
      "projectId": 1
    }
