$kind: http-request
name: Create List
method: POST
url: '{{baseUrl}}/api/lists'
headers:
  - key: Content-Type
    value: application/json
  - key: Authorization
    value: 'Bearer {{token}}'
body:
  type: json
  content: |-
    {
      "name": "Example Name",
      "boardId": 1,
      "statusId": 1
    }
